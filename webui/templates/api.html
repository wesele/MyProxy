{% extends "base.html" %}
{% block title %}API Reference{% endblock %}
{% block content %}
<div class="card" style="padding:0;overflow:hidden;">
    <div id="swagger-ui"></div>
</div>
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.20.1/swagger-ui.css">
<script src="https://unpkg.com/swagger-ui-dist@5.20.1/swagger-ui-bundle.js"></script>
<script>
    SwaggerUIBundle({
        url: "{{ url_for('openapi_spec') }}",
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIBundle.SwaggerUIStandalonePreset
        ],
        layout: "BaseLayout",
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 1,
        tryItOutEnabled: false
    });
</script>
<style>
    .swagger-ui .topbar { display: none; }
    .swagger-ui .info { margin: 16px 20px; }
    .swagger-ui .info .title { font-size: 22px; }
    .swagger-ui .scheme-container { margin: 8px 0; padding: 8px 20px; }
    .swagger-ui .wrapper { padding: 0; }
</style>
{% endblock %}

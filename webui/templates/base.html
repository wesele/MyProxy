<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Proxy - {% block title %}Dashboard{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .nav { background: #1a1a2e; color: white; padding: 0 24px; display: flex; align-items: center; height: 56px; gap: 32px; }
        .nav a { color: #ccc; text-decoration: none; font-size: 14px; transition: color .2s; }
        .nav a:hover, .nav a.active { color: white; }
        .nav .brand { font-size: 18px; font-weight: 700; color: white; margin-right: 16px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 20px; margin-bottom: 20px; }
        .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #555; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; font-size: 14px; border: none; cursor: pointer; text-decoration: none; }
        .btn-primary { background: #4361ee; color: white; }
        .btn-primary:hover { background: #3a56d4; }
        .btn-danger { background: #e63946; color: white; }
        .btn-danger:hover { background: #c1121f; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        th { font-weight: 600; color: #666; background: #fafafa; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .badge-active { background: #d4edda; color: #155724; }
        .badge-inactive { background: #f8d7da; color: #721c24; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .form-group textarea { font-family: monospace; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .stat-card { text-align: center; padding: 16px; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: #4361ee; }
        .stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
        .flash { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
        .flash-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .empty { text-align: center; color: #999; padding: 40px; font-size: 14px; }
        .inline-flex { display: inline-flex; gap: 6px; align-items: center; }
    </style>
</head>
<body>
    <nav class="nav">
        <span class="brand">My Proxy</span>
        <a href="{{ url_for('dashboard') }}" class="{% if request.path == '/admin/dashboard' %}active{% endif %}">Dashboard</a>
        <a href="{{ url_for('models') }}" class="{% if 'models' in request.path and 'fetch' not in request.path %}active{% endif %}">Models</a>
        <a href="{{ url_for('providers') }}" class="{% if 'providers' in request.path %}active{% endif %}">Providers</a>
        <a href="{{ url_for('tools') }}" class="{% if 'tools' in request.path %}active{% endif %}">Tools</a>
        <a href="{{ url_for('api_docs') }}" class="{% if request.path == '/admin/api' %}active{% endif %}">API</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
